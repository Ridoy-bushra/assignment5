<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tailwind+daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!--font_link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--fontawesome_icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Traker</title>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
        <nav class="flex justify-between p-5 bg-white">
            <div class="flex justify-center items-center gap-3">
            <img src="./assets/github-logo.png" alt="" class="w-10">
            <h2 class="font-bold">Github Issues Traker</h2>
        </div>
        <div>
            <div class="join gap-4">
                <div>
                    <label class="input validator join-item rounded-sm">
                    <input type="text" placeholder="🔍︎ search issues" required  id="search-keyword"/>
                    </label>
                    </div>
            <button class="btn btn-primary join-item rounded-sm" id="search-btn">+ New Issue</button>
            </div>
        </div>
        </nav>
</body>
</html>
